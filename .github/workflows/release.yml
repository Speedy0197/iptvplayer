name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build APK
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Rename artifact
        run: mv flutter_app/build/app/outputs/flutter-apk/app-release.apk iptv-player-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: iptv-player-android.apk

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Windows
        working-directory: flutter_app
        run: flutter build windows --release

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          New-Item -ItemType Directory -Force -Path flutter_app\installer_output | Out-Null
          & $iscc /DAppVersion=$tag flutter_app\windows\installer\installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: flutter_app/installer_output/iptv-player-windows.exe

  release:
    name: Create GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-apk

      - uses: actions/download-artifact@v4
        with:
          name: windows-exe

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: IPTV Player ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            iptv-player-android.apk
            iptv-player-windows.exe
