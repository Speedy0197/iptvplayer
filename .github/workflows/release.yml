name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  # This must be a Flutter SDK release, not the bundled Dart SDK version.
  FLUTTER_VERSION: "3.41.7"

jobs:
  build-android:
    name: Build Android APK (Universal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Configure Android signing
        working-directory: flutter_app/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > upload-keystore.jks
            printf '%s\n' \
              "storePassword=$ANDROID_KEYSTORE_PASSWORD" \
              "keyPassword=$ANDROID_KEY_PASSWORD" \
              "keyAlias=$ANDROID_KEY_ALIAS" \
              "storeFile=../upload-keystore.jks" \
              > key.properties
          else
            echo "Android signing secrets not fully configured; build will use debug signing."
          fi

      - name: Build Android APK (Universal)
        working-directory: flutter_app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          flutter build apk --release \
            --build-name="$VERSION" \
            --build-number="$(date +%s)"
          mv build/app/outputs/flutter-apk/app-release.apk streampilot-android.apk

      - name: Attach APK to GitHub Release
        run: gh release upload "${{ github.ref_name }}" flutter_app/streampilot-android.apk --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Windows
        working-directory: flutter_app
        run: flutter build windows --release

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          New-Item -ItemType Directory -Force -Path flutter_app\installer_output | Out-Null
          & $iscc /DAppVersion=$tag flutter_app\windows\installer\installer.iss

      - name: Attach installer to GitHub Release
        run: gh release upload "${{ github.ref_name }}" flutter_app/installer_output/iptv-player-windows.exe --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

