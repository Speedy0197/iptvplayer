name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  # This must be a Flutter SDK release, not the bundled Dart SDK version.
  FLUTTER_VERSION: "3.41.7"

jobs:
  build-android:
    name: Build Android APK (Universal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Android APK (Universal)
        working-directory: flutter_app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          flutter build apk --release \
            --build-name="$VERSION" \
            --build-number="$(date +%s)"
          mv build/app/outputs/flutter-apk/app-release.apk streampilot-android.apk

      - name: Attach APK to GitHub Release
        run: gh release upload "${{ github.ref_name }}" flutter_app/streampilot-android.apk --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Windows
        working-directory: flutter_app
        run: flutter build windows --release

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          New-Item -ItemType Directory -Force -Path flutter_app\installer_output | Out-Null
          & $iscc /DAppVersion=$tag flutter_app\windows\installer\installer.iss

      - name: Attach installer to GitHub Release
        run: gh release upload "${{ github.ref_name }}" flutter_app/installer_output/iptv-player-windows.exe --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    name: Deploy GitHub Pages
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
